<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Fashion Discovery Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-messages-wrapper">
                <div class="chat-messages" id="chat-messages">
                    <!-- Initial Bot Message -->
                    <div class="message-row bot">
                        <div class="avatar bot-avatar">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                            </svg>
                        </div>
                        <div class="message-content bot-content">
                            <p>Hi there! I can help you find fashion products. What are you looking for today?</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-wrapper">
                <form id="chat-form" class="chat-input-form">
                    <input type="text" id="user-input" placeholder="Type your fashion query..." autocomplete="off">
                    <button type="submit" id="send-button" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Template for Product Card -->
    <template id="product-card-template">
        <a class="product-card" href="#" target="_blank">
            <div class="product-image-container">
                <img src="" alt="Product" class="product-image" loading="lazy">
            </div>
            <div class="product-info">
                <h3 class="product-title"></h3>
                <p class="product-price"></p>
                <div class="store-badge"></div>
            </div>
        </a>
    </template>

    <script src="/static/script.js"></script>
</body>
</html>
